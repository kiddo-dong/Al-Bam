spring.application.name=albam

# DB Connection
spring.datasource.url=jdbc:mysql://localhost:3306/al-bam
spring.datasource.username=root
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
# hibernate.dialect: Spring Boot 3.x는 자동 감지하므로 명시 불필요 (지정 시 deprecated 경고 발생)

# Server
#server.address=0.0.0.0
server.port=8080

# JWT
jwt.secret=${JWT_SECRET:local-dev-secret-key-change-me-please-1234567890}
jwt.access-token-expiration-ms=3600000
jwt.refresh-token-expiration-ms=1209600000