spring.application.name=albam

# DB Connection
spring.datasource.url=jdbc:mysql://localhost:3306/al-bam
spring.datasource.username=root
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
# hibernate.dialect: Spring Boot 3.x는 자동 감지하므로 명시 불필요 (지정 시 deprecated 경고 발생)

# Server -> 배포 시 nginx
#server.address=0.0.0.0
server.port=8080

# JWT
jwt.secret=${JWT_SECRET}
jwt.access-token-expiration-ms=3600000
jwt.refresh-token-expiration-ms=1209600000

# AWS S3
aws.region=${AWS_REGION:ap-northeast-2}
aws.s3.bucket-name=${AWS_S3_BUCKET_NAME}

# Mail (Gmail SMTP) - 미설정 시 기동은 되고 메일 발송 시점에만 실패
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME}
spring.mail.password=${GMAIL_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# 메일 본문 링크에 쓰는 베이스 URL (배포 시 도메인으로 교체)
app.base-url=${APP_BASE_URL:http://127.0.0.1:8080}

# 파일 업로드 한도 (기본값 1MB는 프로필 사진에 부족)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB